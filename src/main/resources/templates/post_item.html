<div class="post-card">
    <div class="post-header">
        <img src="" class="post-avatar-small post-img-target">
        <div class="post-meta">
            <a href="" class="post-link-target" style="text-decoration: none; color: inherit;">
                <span class="post-username-target" style="font-weight: bold;"></span>
            </a>
            <span class="post-date-target" style="font-size: 0.8rem; color: #888;"></span>
        </div>
    </div>
    <div class="post-content post-text-target" style="white-space: pre-wrap; margin-top: 10px;">
    </div>

    <div class="post-actions">
        <button class="upvote-btn">
            Upvote (<span class="upvote-count-target">0</span>)
        </button>
        <button class="downvote-btn">
            Downvote (<span class="downvote-count-target">0</span>)
        </button>
    </div>
</div>
